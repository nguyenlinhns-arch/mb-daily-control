<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>MB Daily Control</title><style>
:root{--n:#0b1f36;--b:#2467c9;--g:#087b54;--gb:#eaf8f2;--a:#925605;--ab:#fff5df;--r:#b42318;--rb:#fff0ee;--i:#172033;--m:#66758a;--l:#dde5ee;--bg:#f3f6fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--i);font:15px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif}.wrap{width:min(1120px,calc(100% - 24px));margin:auto;padding:16px 0 36px}.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.brand{display:flex;gap:10px;align-items:center}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:12px;background:var(--n);color:#fff;font-weight:900}.brand b,.brand small{display:block}.brand small{color:var(--m)}button{border:1px solid var(--l);background:#fff;border-radius:10px;padding:8px 11px;font-weight:800;color:var(--n)}.hero{overflow:hidden;border-radius:20px;background:linear-gradient(135deg,var(--n),#174d79);color:#fff}.hero-main{padding:24px}.tag{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#a9c2dd;font-weight:800}h1{margin:7px 0 9px;font-size:clamp(2rem,4vw,3rem);line-height:1.05}.hero p{margin:0;color:#c5d5e6}.facts,.pnl,.methods,.groups,.ledger{display:grid;gap:9px}.facts{grid-template-columns:repeat(4,1fr);margin-top:17px}.facts div{padding:10px;border:1px solid #ffffff20;border-radius:10px;background:#ffffff0c}.facts span,.facts b{display:block}.facts span{font-size:.65rem;color:#b8cadd}.signals{padding:19px;background:#f8fbff;color:var(--i)}.signals h2,.section h2{margin:0}.methods{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));margin-top:12px}.method{padding:14px;border:1px solid #b8ddcc;border-top:4px solid var(--g);border-radius:14px;background:#fff}.mh{display:flex;justify-content:space-between;gap:8px}.gate{font-size:.65rem;font-weight:900;color:var(--g);background:var(--gb);padding:4px 7px;border-radius:999px}.nums{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.num{flex:1;min-width:105px;text-align:center;background:#f5f8fb;border:1px solid var(--l);border-radius:11px;padding:10px}.num b{display:block;font-size:2rem;color:var(--n)}.num em{font-style:normal;color:var(--b);font-weight:900}.mini{font-size:.7rem;color:var(--m)}.note{padding:9px 11px;border-radius:10px;background:var(--ab);color:#704307;font-size:.78rem}.section{margin-top:22px}.head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:10px}.head p{margin:0;color:var(--m);text-align:right}.pnl{grid-template-columns:repeat(5,1fr)}.pc{padding:13px;border:1px solid var(--l);border-radius:13px;background:#fff}.pc.main{background:var(--gb);border-color:#a8d7c3}.pc.pending{background:var(--ab);border-color:#eed09b}.pc span,.pc b,.pc small{display:block}.pc span{font-size:.62rem;color:var(--m);text-transform:uppercase}.pc b{font-size:1.2rem;margin:4px 0}.pos{color:var(--g)}.neg{color:var(--r)}.zero{color:var(--m)}.groups{grid-template-columns:repeat(3,1fr)}.card{padding:15px;border:1px solid var(--l);border-top:4px solid #d49b39;border-radius:14px;background:#fff}.card.pass{border-top-color:var(--g)}.card h3{margin:2px 0 8px}.pill{font-size:.62rem;font-weight:900;padding:4px 7px;border-radius:999px;background:var(--ab);color:var(--a)}.pass .pill{background:var(--gb);color:var(--g)}.ch{display:flex;justify-content:space-between;gap:8px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}.chip{padding:7px 9px;border-radius:9px;background:#eef3f8;color:var(--n);font-weight:900}.why{font-size:.75rem;color:#704307;background:var(--ab);padding:8px;border-radius:8px}.cand{margin-top:8px;border-top:1px solid #edf1f5;padding-top:7px;font-size:.72rem;color:var(--m)}.panel{margin-top:22px;padding:17px;border:1px solid var(--l);border-radius:15px;background:#fff}.ledger{grid-template-columns:repeat(5,1fr)}.li{padding:11px;border-radius:10px;background:#f6f8fb}.li span,.li b,.li small{display:block}.li span{font-size:.62rem;color:var(--m);text-transform:uppercase}.total{font-size:1.3rem;color:var(--g)}details{margin-top:20px;background:#fff;border:1px solid var(--l);border-radius:13px}summary{cursor:pointer;padding:12px 14px;font-weight:800}.audit{padding:0 14px 14px}.codes{display:grid;grid-template-columns:repeat(9,1fr);gap:5px}.codes span{text-align:center;padding:6px;background:#f0f4f8;border-radius:7px;font-weight:800}.err{padding:20px;background:var(--rb);color:var(--r);border-radius:14px}footer{margin-top:22px;color:var(--m);font-size:.72rem}@media(max-width:900px){.pnl{grid-template-columns:repeat(3,1fr)}.groups{grid-template-columns:repeat(2,1fr)}.ledger{grid-template-columns:repeat(3,1fr)}}@media(max-width:600px){.facts,.pnl,.groups,.ledger{grid-template-columns:1fr 1fr}.head{align-items:flex-start;flex-direction:column}.head p{text-align:left}.codes{grid-template-columns:repeat(6,1fr)}}
</style></head><body><div class="wrap"><header class="bar"><div class="brand"><div class="logo">MB</div><div><b>MB Daily Control</b><small>XSMB Daily Validation</small></div></div><button id="refresh">↻ Làm mới</button></header><main id="app">Đang tải…</main><footer>Chỉ ghi lãi/lỗ sau khi kết quả được khóa. Sổ archive hiển thị riêng và được cộng vào tổng toàn bộ.</footer></div><script>
(()=>{"use strict";const app=document.getElementById("app"),btn=document.getElementById("refresh"),e=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])),fmt=n=>new Intl.NumberFormat("vi-VN").format(Number(n||0))+"đ",sgn=n=>(Number(n)>0?"+":Number(n)<0?"−":"")+fmt(Math.abs(Number(n||0))),cls=n=>Number(n)>0?"pos":Number(n)<0?"neg":"zero",date=s=>{if(!s)return"—";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`},status=s=>String(s).includes("PASS")?"pass":"";
const sig=m=>`<article class="method"><div class="mh"><div><small>${e(m.method)}</small><h2>${e(m.label)}</h2></div><span class="gate">${e(m.status)}</span></div><div class="nums">${(m.numbers||[]).map(n=>`<div class="num"><b>${e(n.code)}</b><em>×${e(n.points)} điểm</em><small>${e(n.role)} · ${fmt(n.capital_vnd)}</small></div>`).join("")}</div><div class="mini">${e(m.code_count)} mã · ${fmt(m.capital_vnd)}</div></article>`;
const card=g=>`<article class="card ${status(g.status)}"><div class="ch"><div><small>${e(g.role)}</small><h3>${e(g.label)}</h3></div><span class="pill">${e(g.status)}</span></div><b>${e(g.method)}</b><div class="chips">${(g.selected_numbers||[]).map(x=>`<span class="chip">${e(x)}</span>`).join("")}</div><p>${e(g.summary)}</p><div class="why">${e(g.reason)}</div>${(g.candidates||[]).map(c=>`<div class="cand"><b>${e(c.code)}</b> · ${e(c.status)}${c.gan!==undefined?` · Gan ${c.gan}`:""}${c.gmax!==undefined?` · Gmax ${c.gmax}`:""}${c.score!==undefined?` · Score ${Number(c.score).toFixed(3)}`:""} — ${e(c.reason)}</div>`).join("")}</article>`;
const pc=(l,v,n,k="")=>`<div class="pc ${k}"><span>${e(l)}</span><b class="${cls(v)}">${sgn(v)}</b><small>${e(n)}</small></div>`;
function render(d){const p=d.portfolio||{},t=d.top_signals||{},q=d.pnl_summary||{},l=d.ledger||{},ds=d.data||{};const pnl=[pc("Kết quả hôm qua",q.yesterday_pnl_vnd,`${date(q.yesterday_date)} · ${q.yesterday_hits} nháy`),pc("Tổng 5 nhóm",q.active_five_group_pnl_vnd,`Khóa đến ${date(q.confirmed_through)}`,"main"),pc("Sổ archive",q.archive_pnl_vnd,"Than Vo lưu trữ"),pc("Tổng toàn bộ",q.grand_total_pnl_vnd,"5 nhóm + archive","main"),`<div class="pc pending"><span>Lệnh hôm nay chờ KQ</span><b>${fmt(q.today_pending_capital_vnd)}</b><small>${e(q.today_pending_order)} · chưa cộng P/L</small></div>`].join("");app.innerHTML=`<section class="hero"><div class="hero-main"><span class="tag">RÀ SOÁT ${date(d.target_date)}</span><h1>${e(p.title)}</h1><p>${e(p.reason)}</p><div class="facts"><div><span>Tổng điểm</span><b>${e(t.total_points)}</b></div><div><span>Số mã</span><b>${e(t.total_numbers)}</b></div><div><span>Vốn hôm nay</span><b>${fmt(t.total_capital_vnd)}</b></div><div><span>Trạng thái</span><b>${e(p.tier)}</b></div></div></div><div class="signals"><div class="head"><div><span class="tag" style="color:#64778e">${e(t.title)}</span><h2>${e(t.subtitle)}</h2></div><p>${e(t.total_methods)} phương pháp đạt</p></div><div class="methods">${(t.methods||[]).map(sig).join("")||'<div class="note">Không có tín hiệu đạt gate.</div>'}</div><div class="note">${e(t.note)}</div></div></section><section class="section"><div class="head"><div><span class="tag" style="color:#64778e">LÃI/LỖ</span><h2>Theo dõi vốn và lợi nhuận</h2></div><p>Hôm qua đã cộng; lệnh hôm nay chưa cộng.</p></div><div class="pnl">${pnl}</div></section><section class="section"><div class="head"><div><span class="tag" style="color:#64778e">CHI TIẾT</span><h2>A1 · X2 · X3 · Xiên · Đề</h2></div><p>Phương pháp fail vẫn có chi tiết nhưng 0 điểm.</p></div><div class="groups">${(d.groups||[]).map(card).join("")}</div></section><section class="panel"><div class="head"><div><span class="tag" style="color:#64778e">SỔ 5 NHÓM</span><h2>Chi tiết đã xác nhận</h2></div><b class="total">${sgn(l.total_pnl_vnd)}</b></div><div class="ledger">${(l.items||[]).map(i=>`<div class="li"><span>${e(i.label)}</span><b class="${cls(i.pnl_vnd)}">${sgn(i.pnl_vnd)}</b><small>${e(i.note)}</small></div>`).join("")}</div><p class="mini">${e(l.note)}</p></section><details><summary>Kiểm toán dữ liệu và 27 mã gần nhất</summary><div class="audit"><p>${e(ds.source_label)}</p><div class="codes">${(ds.latest_27_codes||[]).map(x=>`<span>${e(x)}</span>`).join("")}</div></div></details>`}
async function load(){btn.disabled=true;try{const r=await fetch(`./data/current.json?v=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw Error(`HTTP ${r.status}`);render(await r.json())}catch(x){app.innerHTML=`<div class="err"><b>Không tải được dữ liệu.</b><p>${e(x.message)}</p></div>`}finally{btn.disabled=false}}btn.onclick=load;load();setInterval(load,120000)})();
</script></body></html>
