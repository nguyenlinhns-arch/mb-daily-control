name: Apply confirmed manual real orders

# V32_PRODUCTION_GUARD: legacy writer is manual rollback only.
on:
  workflow_dispatch:
    inputs:
      confirm_legacy:
        description: "Nhập ENABLE_LEGACY để chạy bộ điều khiển cũ"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: apply-confirmed-manual-orders-v2
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ inputs.confirm_legacy == 'ENABLE_LEGACY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply all confirmed orders
        run: python scripts/apply_manual_orders_v2.py

      - name: Validate confirmed-order invariant
        run: python scripts/apply_manual_orders_v2.py --check

      - name: Commit only when files changed
        run: |
          if git diff --quiet -- data; then
            echo "Confirmed manual orders already applied."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git commit -m "data: apply confirmed manual real orders"
          git pull --rebase origin main
          git push origin HEAD:main
