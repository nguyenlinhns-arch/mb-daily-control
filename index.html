<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta name="theme-color" content="#0b1f36">
  <meta name="description" content="MB Daily Control — bảng điều khiển XSMB hằng ngày">
  <title>MB Daily Control</title>
  <style>
    :root{--navy:#0b1f36;--navy2:#133b61;--blue:#2d6cdf;--green:#087b54;--green-bg:#eaf8f2;--amber:#9a5b04;--amber-bg:#fff6e5;--red:#b42318;--red-bg:#fff0ee;--ink:#152033;--muted:#66758a;--line:#dfe6ef;--canvas:#f2f5f9;--shadow:0 16px 40px rgba(13,33,58,.09)}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% -10%,rgba(45,108,223,.15),transparent 29rem),var(--canvas);color:var(--ink);font:15px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button{font:inherit}.shell{width:min(1180px,calc(100% - 28px));margin:auto;padding:18px 0 42px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:11px}.mark{display:grid;width:44px;height:44px;place-items:center;border-radius:13px;background:linear-gradient(145deg,var(--navy2),var(--navy));color:#fff;font-weight:900}.brand strong,.brand small{display:block}.brand small{color:var(--muted);font-size:.75rem}.actions{display:flex;align-items:center;gap:8px}.state,.refresh{border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px 12px}.state{font-size:.75rem;color:var(--muted)}.state.ok{color:var(--green);border-color:#a9dbc8;background:var(--green-bg)}.refresh{cursor:pointer;color:var(--navy2);font-weight:800}.refresh:disabled{opacity:.55;cursor:wait}
    .hero{overflow:hidden;border-radius:24px;background:linear-gradient(135deg,var(--navy),var(--navy2));box-shadow:var(--shadow)}.hero-main{padding:28px;color:#fff}.eyebrow{font-size:.7rem;font-weight:850;letter-spacing:.12em;text-transform:uppercase;color:#9ebee0}.hero h1{margin:8px 0 10px;font-size:clamp(2rem,4vw,3.2rem);line-height:1.05;letter-spacing:-.045em}.hero-main p{margin:0;color:#c3d3e5;max-width:800px}.facts{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:20px}.facts div{padding:10px;border:1px solid rgba(255,255,255,.13);border-radius:12px;background:rgba(255,255,255,.06)}.facts span,.facts strong{display:block}.facts span{font-size:.67rem;color:#aabed5}.facts strong{margin-top:3px;font-size:.9rem}.qualified{padding:23px;background:#f7fbff}.qualified-head{display:flex;align-items:end;justify-content:space-between;gap:14px}.qualified-head strong{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--navy2)}.qualified-head small{color:var(--muted)}.signal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin:14px 0}.signal-method{padding:16px;border:1px solid #bdd7c9;border-top:4px solid var(--green);border-radius:16px;background:#fff}.signal-method-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.signal-method h2{margin:2px 0 0;font-size:1.25rem}.signal-method .gate{padding:5px 8px;border-radius:999px;background:var(--green-bg);color:var(--green);font-size:.65rem;font-weight:900}.signal-numbers{display:flex;flex-wrap:wrap;gap:9px;margin:14px 0}.signal-number{min-width:112px;flex:1;padding:12px;border:1px solid #d5e1eb;border-radius:13px;background:#f8fafc;text-align:center}.signal-number b{display:block;font-size:2.25rem;line-height:1;color:var(--navy)}.signal-number em{display:block;margin-top:7px;color:var(--blue);font-style:normal;font-weight:900}.signal-number small{display:block;margin-top:3px;color:var(--muted);font-size:.68rem}.signal-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.signal-summary div{padding:8px;border-radius:9px;background:#eef5f1}.signal-summary span,.signal-summary strong{display:block}.signal-summary span{font-size:.59rem;color:var(--muted);text-transform:uppercase}.signal-summary strong{margin-top:2px;font-size:.75rem}.notice{padding:10px 12px;border-radius:11px;background:var(--amber-bg);color:#754606;font-size:.78rem;font-weight:700}
    .meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;overflow:hidden;margin:16px 0 28px;border:1px solid var(--line);border-radius:16px;background:var(--line)}.meta-grid div{padding:14px;background:#fff}.meta-grid span,.meta-grid strong,.meta-grid small{display:block}.meta-grid span{font-size:.67rem;color:var(--muted);text-transform:uppercase}.meta-grid strong{margin:4px 0 2px}.meta-grid small{color:#7d8898}.section{margin-top:26px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:13px}.section-head h2{margin:0;font-size:1.65rem}.section-head p{margin:0;color:var(--muted);text-align:right;max-width:520px}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.card{grid-column:span 2;padding:18px;border:1px solid var(--line);border-top:4px solid #d09630;border-radius:17px;background:#fff;box-shadow:0 7px 21px rgba(13,33,58,.045)}.card:nth-last-child(-n+2){grid-column:span 3}.card.pass{border-top-color:var(--green)}.card.a0{border-top-color:#d09630}.card.fail{border-top-color:var(--red)}.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.kicker{font-size:.64rem;font-weight:850;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.card h3{margin:3px 0 0;font-size:1.35rem}.pill{display:inline-flex;padding:5px 8px;border-radius:999px;background:var(--amber-bg);color:var(--amber);font-size:.62rem;font-weight:900;white-space:nowrap}.pill.pass{background:var(--green-bg);color:var(--green)}.pill.fail{background:var(--red-bg);color:var(--red)}.summary{min-height:42px;margin:13px 0;color:#4e5c6f;font-size:.83rem}.numbers{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}.num{display:grid;min-width:47px;height:47px;padding:0 8px;place-items:center;border:1px solid #c5d3e2;border-radius:12px;background:#f5f8fb;color:var(--navy2);font-weight:900;font-size:1.1rem}.card-facts{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}.card-facts div{padding:8px;border-radius:9px;background:#f5f7fa}.card-facts span,.card-facts strong{display:block}.card-facts span{font-size:.59rem;color:var(--muted);text-transform:uppercase}.card-facts strong{font-size:.73rem;margin-top:2px}.reason{padding:9px 10px;border-radius:10px;background:var(--amber-bg);color:#744808;font-size:.75rem}.candidate-list{margin:10px 0 0;padding:0;list-style:none}.candidate{display:flex;gap:9px;padding:9px 0;border-top:1px solid #edf0f4}.candidate-code{display:grid;width:37px;height:37px;flex:0 0 auto;place-items:center;border-radius:10px;background:#edf3f8;color:var(--navy2);font-weight:900}.candidate-main{min-width:0;flex:1}.candidate-main strong,.candidate-main small{display:block}.candidate-main strong{font-size:.75rem}.candidate-main small{color:var(--muted);font-size:.67rem}.candidate-main p{margin:3px 0 0;color:#778398;font-size:.67rem}.panel{margin-top:24px;padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:0 7px 22px rgba(13,33,58,.045)}.ledger-total{padding:10px 13px;border-radius:12px;background:var(--green-bg);text-align:right}.ledger-total span,.ledger-total strong{display:block}.ledger-total span{color:#467a65;font-size:.67rem}.ledger-total strong{font-size:1.3rem;color:var(--green)}.ledger{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.ledger-item,.bt{padding:12px;border:1px solid #e5eaf0;border-radius:12px;background:#fafbfc}.ledger-item span,.ledger-item strong,.ledger-item small,.bt span,.bt strong,.bt small{display:block}.ledger-item span,.bt span{font-size:.66rem;color:var(--muted);text-transform:uppercase}.ledger-item strong{margin:4px 0;font-size:1rem}.ledger-item small,.bt small{color:#7b8796;font-size:.67rem}.pos{color:var(--green)}.neg{color:var(--red)}.zero{color:var(--muted)}.backtests{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:9px}.bt strong{margin:4px 0}.codes{display:grid;grid-template-columns:repeat(9,1fr);gap:6px}.codes span{display:flex;justify-content:center;gap:4px;padding:7px;border-radius:8px;background:#f1f4f8;font-weight:850}.codes small{color:#8a96a6;font-size:.55rem}.policy{padding:13px;border-left:4px solid var(--blue);border-radius:10px;background:#f3f7ff}.policy strong{display:block;margin-bottom:4px}.policy p{margin:0;color:#506179;font-size:.8rem}details{margin-top:20px;border:1px solid var(--line);border-radius:15px;background:#fff}summary{cursor:pointer;padding:14px 16px;font-weight:800}.audit{padding:0 16px 16px}.audit dl{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line)}.audit dl div{padding:10px;background:#fff}.audit dt{font-size:.64rem;color:var(--muted);text-transform:uppercase}.audit dd{margin:3px 0 0;overflow-wrap:anywhere;font-size:.72rem}.error{padding:24px;border:1px solid #efb7b1;border-radius:16px;background:var(--red-bg);color:var(--red)}footer{display:flex;justify-content:space-between;gap:20px;padding:26px 2px 0;color:var(--muted);font-size:.72rem}
    @media(max-width:900px){.facts,.meta-grid{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:repeat(2,1fr)}.card,.card:nth-last-child(-n+2){grid-column:span 1}.ledger{grid-template-columns:repeat(3,1fr)}}@media(max-width:620px){.shell{width:min(100% - 18px,1180px)}.topbar{align-items:flex-start}.state{display:none}.hero-main,.qualified{padding:20px}.facts,.meta-grid{grid-template-columns:1fr 1fr}.signal-grid,.cards{grid-template-columns:1fr}.ledger{grid-template-columns:1fr 1fr}.codes{grid-template-columns:repeat(6,1fr)}.section-head{align-items:flex-start;flex-direction:column}.section-head p{text-align:left}.audit dl{grid-template-columns:1fr}footer{display:block}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar"><div class="brand"><div class="mark">MB</div><div><strong>MB Daily Control</strong><small>XSMB Daily Validation</small></div></div><div class="actions"><div id="liveState" class="state">Đang tải dữ liệu…</div><button id="refresh" class="refresh" type="button">↻ Làm mới</button></div></header>
    <main id="app"><div class="panel">Đang tải kết quả mới nhất…</div></main>
    <footer><div><strong>MB Daily Control</strong><br><span>Không gấp thếp · Chỉ ghi P/L sau khi kết quả được khóa</span></div><p>Backtest là tham chiếu, không phải cam kết chắc thắng. Khối đầu chỉ hiển thị A1/X2/X3 đạt tiêu chí.</p></footer>
  </div>
<script>
(() => {
  "use strict";
  const app=document.getElementById("app"),refresh=document.getElementById("refresh"),live=document.getElementById("liveState");
  const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const vnd=n=>new Intl.NumberFormat("vi-VN").format(Number(n||0))+"đ";
  const signed=n=>{const x=Number(n||0);return(x>0?"+":x<0?"−":"")+vnd(Math.abs(x))};
  const moneyClass=n=>Number(n)>0?"pos":Number(n)<0?"neg":"zero";
  const dateVN=s=>{if(!s)return"—";const[y,m,d]=String(s).split("-");return`${d}/${m}/${y}`};
  const statusClass=s=>String(s).includes("PASS")||String(s)==="REAL"?"pass":String(s).startsWith("A0")?"a0":"fail";
  function signalMethod(m){const nums=(m.numbers||[]).map(n=>`<div class="signal-number"><b>${esc(n.code)}</b><em>×${esc(n.points)} điểm</em><small>${esc(n.role)} · ${vnd(n.capital_vnd)}</small></div>`).join("");return`<article class="signal-method"><div class="signal-method-head"><div><span class="kicker">${esc(m.method)}</span><h2>${esc(m.label)}</h2></div><span class="gate">${esc(m.status)}</span></div><div class="signal-numbers">${nums}</div><div class="signal-summary"><div><span>Điểm/số</span><strong>${esc(m.points_per_code)}</strong></div><div><span>Số mã</span><strong>${esc(m.code_count)}</strong></div><div><span>Vốn</span><strong>${vnd(m.capital_vnd)}</strong></div></div></article>`}
  function candidate(c){const metrics=[c.gan!==undefined?`Gan ${c.gan}`:"",c.gmax!==undefined?`Gmax ${c.gmax}`:"",c.score!==undefined?`Score ${Number(c.score).toFixed(4).replace(".",",")}`:"",c.hot21!==undefined?`HOT21 ${c.hot21}`:"",c.tier||""].filter(Boolean).join(" · ");return`<li class="candidate"><span class="candidate-code">${esc(c.code)}</span><div class="candidate-main"><strong>#${esc(c.rank||"—")} · ${esc(c.status||"WATCH")}</strong><small>${esc(metrics)}</small><p>${esc(c.reason||"")}</p></div></li>`}
  function groupCard(g){const nums=(g.selected_numbers||[]).map(n=>`<span class="num">${esc(n)}</span>`).join("");const h=g.historical_profile||{};const pointLabel=g.points_per_code!==undefined?`${g.points_per_code}/số`:g.points??0;const facts=[["Điểm",pointLabel],["Vốn",vnd(g.capital_vnd||0)],["WR lịch sử",h.win_rate||"—"]].map(([a,b])=>`<div><span>${esc(a)}</span><strong>${esc(b)}</strong></div>`).join("");return`<article class="card ${statusClass(g.status)}"><div class="card-head"><div><span class="kicker">${esc(g.role)}</span><h3>${esc(g.label)}</h3></div><span class="pill ${statusClass(g.status)}">${esc(g.status)}</span></div><p class="summary"><strong>${esc(g.method)}</strong> · ${esc(g.summary)}</p><div class="numbers">${nums}</div><div class="card-facts">${facts}</div><div class="reason">${esc(g.reason)}</div><ul class="candidate-list">${(g.candidates||[]).map(candidate).join("")}</ul></article>`}
  function render(d){document.title=`MB Daily Control — ${dateVN(d.target_date)}`;const p=d.portfolio||{},ts=d.top_signals||{},ds=d.data||{},led=d.ledger||{};const methods=(ts.methods||[]).map(signalMethod).join("")||`<div class="notice">Không có phương pháp A1/X2/X3 đạt gate.</div>`;const groups=(d.groups||[]).map(groupCard).join("");const ledgerItems=(led.items||[]).map(i=>`<div class="ledger-item"><span>${esc(i.label)}</span><strong class="${moneyClass(i.pnl_vnd)}">${signed(i.pnl_vnd)}</strong><small>${esc(i.note)}</small></div>`).join("");const bts=(d.backtests||[]).map(b=>`<div class="bt"><span>${esc(b.status)}</span><strong>${esc(b.label)}</strong><small>${esc(b.period)} · ${esc(b.orders)} lệnh · WR ${esc(b.win_rate)} · P/L ${signed(b.pnl_vnd)} · DD ${signed(b.max_drawdown_vnd)}</small></div>`).join("");const codes=(ds.latest_27_codes||[]).map((c,i)=>`<span><small>${i+1}</small>${esc(c)}</span>`).join("");app.innerHTML=`<section class="hero"><div class="hero-main"><span class="eyebrow">RÀ SOÁT ${dateVN(d.target_date)}</span><h1>${esc(p.title)}</h1><p>${esc(p.reason)}</p><div class="facts"><div><span>Tổng điểm</span><strong>${esc(ts.total_points??p.points??0)}</strong></div><div><span>Tổng số mã</span><strong>${esc(ts.total_numbers??p.code_count??0)}</strong></div><div><span>Vốn hôm nay</span><strong>${vnd(ts.total_capital_vnd??p.capital_vnd??0)}</strong></div><div><span>Trạng thái</span><strong>${esc(p.tier)}</strong></div></div></div><div class="qualified"><div class="qualified-head"><div><strong>${esc(ts.title||"TÍN HIỆU ĐẠT TIÊU CHÍ")}</strong><br><small>${esc(ts.subtitle||"")}</small></div><small>${esc(ts.total_methods||0)} phương pháp đạt</small></div><div class="signal-grid">${methods}</div><div class="notice">${esc(ts.note||"")}</div></div></section><section class="meta-grid"><div><span>Khóa dữ liệu</span><strong>${dateVN(ds.locked_through)}</strong><small>${esc(ds.status)}</small></div><div><span>Kỳ gần nhất</span><strong>${esc(ds.count)}/27 · Unique ${esc(ds.unique)}</strong><small>${esc((ds.repeat_codes||[]).join(", ")||"Không lặp")}</small></div><div><span>Run ID</span><strong>${esc(d.report_run_id)}</strong><small>${esc(d.schema_version)}</small></div><div><span>Lãi/lỗ đã xác nhận</span><strong class="${moneyClass(led.total_pnl_vnd)}">${signed(led.total_pnl_vnd)}</strong><small>Đến ${dateVN(led.confirmed_through)}</small></div></section><section class="section"><div class="section-head"><div><span class="eyebrow" style="color:#62758c">CHI TIẾT PHƯƠNG PHÁP</span><h2>A1 · X2 · X3 · Xiên · Đề</h2></div><p>Phương pháp fail vẫn được liệt kê ở đây với 0 điểm, nhưng không xuất hiện trong khối tín hiệu trên đầu.</p></div><div class="cards">${groups}</div></section><section class="panel"><div class="section-head"><div><span class="eyebrow" style="color:#62758c">SỔ THỰC CHIẾN</span><h2>Lãi/lỗ đã xác nhận</h2></div><div class="ledger-total"><span>Tổng 5 nhóm</span><strong>${signed(led.total_pnl_vnd)}</strong></div></div><div class="ledger">${ledgerItems}</div><p class="summary">${esc(led.note)}</p></section><section class="panel"><div class="section-head"><div><span class="eyebrow" style="color:#62758c">BACKTEST</span><h2>Phương pháp đang theo dõi</h2></div><p>Khối đầu không giới hạn số, nhưng chỉ nhận các phương pháp đạt gate độc lập.</p></div><div class="backtests">${bts}</div><div class="policy" style="margin-top:12px"><strong>${esc(d.top_signal_policy?.mode)}</strong><p>${esc(d.top_signal_policy?.include_rule)} Khi X2 và X3 cùng fail: ${esc(d.top_signal_policy?.when_x2_and_x3_fail)}.</p></div></section><details><summary>Kiểm toán dữ liệu và 27 mã kỳ gần nhất</summary><div class="audit"><dl><div><dt>Snapshot</dt><dd>${esc(d.data_snapshot_id)}</dd></div><div><dt>Hash</dt><dd>${esc(ds.sha256)}</dd></div><div><dt>Nguồn</dt><dd>${esc(ds.source_label)}</dd></div><div><dt>Website</dt><dd>${esc(d.official_url)}</dd></div></dl><div class="codes">${codes}</div></div></details>`;live.textContent=`Đã đồng bộ · ${new Date(d.generated_at).toLocaleString("vi-VN")}`;live.classList.add("ok")}
  async function load(){refresh.disabled=true;live.textContent="Đang lấy dữ liệu mới…";live.classList.remove("ok");try{const r=await fetch(`./data/current.json?v=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();render(d)}catch(e){app.innerHTML=`<div class="error"><strong>Chưa tải được dữ liệu mới.</strong><p>${esc(e.message)}</p><p>Hãy bấm “Làm mới”; trang không tự dùng lại số cũ.</p></div>`;live.textContent="Lỗi đồng bộ"}finally{refresh.disabled=false}}
  refresh.addEventListener("click",load);load();window.setInterval(load,120000);
})();
</script>
</body>
</html>
