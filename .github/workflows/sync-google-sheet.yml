name: Sync XSMB from Google Sheet

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/sync_from_google_sheet.py"
      - "scripts/apply_crosschecked_correction.py"
      - ".github/workflows/sync-google-sheet.yml"
  schedule:
    # 19:15, 19:35 và 19:55 giờ Việt Nam (UTC+7).
    # Các lượt sau là retry; sổ quyết toán bảo đảm không cộng trùng.
    - cron: "15 12 * * *"
    - cron: "35 12 * * *"
    - cron: "55 12 * * *"

permissions:
  contents: write

concurrency:
  group: sync-xsmb-sheet
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_SHEET_ID: 1iVAfqmS-TvP02U8FtKSM2nr_7Dsd7qi2qEGnWV6IK7w
      SOURCE_XLSX_PATH: /tmp/xsmb-source.xlsx
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Download one immutable source snapshot
        run: |
          curl --fail --location --retry 3 --retry-delay 5 \
            "https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/export?format=xlsx" \
            --output "${SOURCE_XLSX_PATH}"
          test -s "${SOURCE_XLSX_PATH}"

      - name: Apply explicitly authorized cross-checked correction
        run: python scripts/apply_crosschecked_correction.py

      - name: Sync latest locked draw and settle confirmed orders
        run: python scripts/sync_from_google_sheet.py

      - name: Commit only when data changed
        run: |
          if git diff --quiet -- data/current.json data/settlement-ledger.json; then
            echo "Không có dữ liệu mới."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/current.json data/settlement-ledger.json
          git commit -m "data: auto sync XSMB $(TZ=Asia/Bangkok date +%F)"
          git pull --rebase origin main
          git push origin HEAD:main
