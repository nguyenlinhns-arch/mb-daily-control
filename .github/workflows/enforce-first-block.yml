name: Enforce current A1/X2/X3/ROLL7 status panels

# V32_PRODUCTION_GUARD: legacy writer is manual rollback only.
on:
  workflow_dispatch:
    inputs:
      confirm_legacy:
        description: "Nhập ENABLE_LEGACY để chạy bộ điều khiển cũ"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: enforce-current-method-panels-v5
  cancel-in-progress: false

jobs:
  enforce:
    if: ${{ inputs.confirm_legacy == 'ENABLE_LEGACY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect controller generation
        id: mode
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          doc = json.loads(Path('data/current.json').read_text(encoding='utf-8'))
          config = str(doc.get('config_id') or '')
          mode = str((doc.get('funding_policy') or {}).get('mode') or '')
          parallel = config.startswith('MB_PARALLEL_') or mode in {
              'FUND_EVERY_EXACT_PASS_METHOD',
              'PARALLEL_INDEPENDENT_ALL_EXACT_PASS',
          }
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"parallel={'true' if parallel else 'false'}\n")
          print({'config_id': config, 'funding_mode': mode, 'parallel': parallel})
          PY

      - name: Build legacy pinned panels only for legacy controller
        if: steps.mode.outputs.parallel != 'true'
        run: python scripts/enforce_top3_first_block.py

      - name: Validate legacy first-block invariant
        if: steps.mode.outputs.parallel != 'true'
        run: python scripts/enforce_top3_first_block.py --check

      - name: Add permanent ROLL7 current-status panel
        run: python scripts/inject_roll7_panel.py

      - name: Validate current method cards and stakes
        run: |
          python scripts/inject_roll7_panel.py --check
          python - <<'PY'
          import json
          from pathlib import Path
          doc = json.loads(Path('data/current.json').read_text(encoding='utf-8'))
          methods = (doc.get('top_signals') or {}).get('methods') or []
          ids = {str(m.get('id') or '').upper() for m in methods}
          assert any('A1' in x for x in ids), ids
          assert any('X2' in x for x in ids), ids
          assert any('X3' in x for x in ids), ids
          assert 'ROLL7_STATUS' in ids, ids
          pending = doc.get('pending_order') or {}
          method_id = str(pending.get('method_id') or '').upper()
          points = pending.get('points_by_code') or {}
          if method_id.startswith('X2_'):
              assert points and all(int(value) == 50 for value in points.values()), points
              assert len(points) == 2, points
          if method_id.startswith('X3_'):
              assert points and all(int(value) == 50 for value in points.values()), points
              assert len(points) == 3, points
          if method_id.startswith('ROLL7'):
              assert points and all(int(value) == 50 for value in points.values()), points
              assert 1 <= len(points) <= 2, points
          if method_id.startswith('ROLL30'):
              assert points and all(int(value) == 50 for value in points.values()), points
              assert 1 <= len(points) <= 2, points
          funded_points = [
              int(value)
              for value in points.values()
              if int(value) > 0
          ]
          assert all(value >= 50 for value in funded_points), funded_points
          policy = doc.get('funding_policy') or {}
          assert policy.get('cross_method_blocking') is False or policy.get('no_cross_method_blocking') is True
          print('A1_X2_X3_ROLL7_CURRENT_CARDS_OK')
          PY

      - name: Commit only when files changed
        run: |
          if git diff --quiet -- data; then
            echo "Current A1/X2/X3/ROLL7 panels already correct."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git commit -m "data: keep ROLL7 visible with current method panels"
          git pull --rebase origin main
          git push origin HEAD:main
