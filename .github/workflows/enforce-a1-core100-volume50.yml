name: Enforce A1 Core100 Volume50 permanent lock

# V32_PRODUCTION_GUARD: legacy writer is manual rollback only.
on:
  workflow_dispatch:
    inputs:
      confirm_legacy:
        description: "Nhập ENABLE_LEGACY để chạy bộ điều khiển cũ"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: enforce-a1-core100-volume50
  cancel-in-progress: false

jobs:
  enforce:
    if: ${{ inputs.confirm_legacy == 'ENABLE_LEGACY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce active payload and current plan
        run: |
          python scripts/enforce_a1_core100_volume50.py
          python scripts/finalize_a1_core100_volume50.py

      - name: Validate permanent invariant
        run: |
          python scripts/enforce_a1_core100_volume50.py --check
          python scripts/finalize_a1_core100_volume50.py --check

      - name: Commit only when the guard changed active files
        run: |
          if git diff --quiet -- data/current.json data/plans data/automation-policy.json index.html; then
            echo "A1 Core100/Volume50 permanent lock already satisfied."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/current.json data/plans data/automation-policy.json index.html
          git commit -m "config: enforce A1 Core100 Volume50 permanent lock"
          git pull --rebase origin main
          git push origin HEAD:main
