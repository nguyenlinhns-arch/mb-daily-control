name: Enforce X2 website display policy

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "data/current.json"
      - ".github/workflows/enforce-x2-display-policy.yml"

permissions:
  contents: write

concurrency:
  group: enforce-x2-display-policy
  cancel-in-progress: false

jobs:
  enforce:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove X2 outcome metrics from website payload
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/current.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          changed = False

          for group in data.get("groups", []):
              if str(group.get("id", "")).upper() != "X2":
                  continue

              profile = group.get("historical_profile")
              if isinstance(profile, dict):
                  for key in ("wins", "losses", "pnl_vnd", "pnl_units"):
                      if key in profile:
                          profile.pop(key)
                          changed = True

              policy = {
                  "hide_fields": ["wins", "losses", "pnl_vnd", "pnl_units"],
                  "keep_fields": ["orders", "win_rate", "max_drawdown_vnd", "max_drawdown_units"],
                  "scope": "WEBSITE_X2_PERMANENT",
              }
              if group.get("display_policy") != policy:
                  group["display_policy"] = policy
                  changed = True

          if changed:
              path.write_text(
                  json.dumps(data, ensure_ascii=False, separators=(",", ":")) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Commit policy enforcement
        run: |
          if git diff --quiet -- data/current.json; then
            echo "X2 website payload already follows the permanent display policy."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/current.json
          git commit -m "ui: hide X2 wins losses and profit metrics"
          git pull --rebase origin main
          git push origin HEAD:main
