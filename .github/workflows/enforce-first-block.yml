name: Enforce first-block all-pass or Top3-WR

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["MB Daily result settlement and next-day plan"]
    types: [completed]
  schedule:
    - cron: "6 7 * * *"
    - cron: "21 12 * * *"
    - cron: "41 12 * * *"
    - cron: "1 13 * * *"
  push:
    branches: ["main"]
    paths:
      - "data/current.json"
      - "data/plans/**"
      - "data/automation-policy.json"
      - "scripts/enforce_top3_first_block.py"
      - ".github/workflows/enforce-first-block.yml"

permissions:
  contents: write

concurrency:
  group: enforce-first-block-v2
  cancel-in-progress: false

jobs:
  enforce:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply corrected first-block policy
        run: python scripts/enforce_top3_first_block.py

      - name: Validate first-block invariant
        run: python scripts/enforce_top3_first_block.py --check

      - name: Commit only when files changed
        run: |
          if git diff --quiet -- data; then
            echo "First-block policy already enforced."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git commit -m "data: enforce all-pass or Top3-WR first block"
          git pull --rebase origin main
          git push origin HEAD:main
