name: MB Daily result settlement and next-day plan

on:
  workflow_dispatch:
  schedule:
    # 14:00 giờ Việt Nam: kiểm tra lại kế hoạch từ dữ liệu đã khóa.
    - cron: "0 7 * * *"
    # 19:15, 19:35, 19:55 giờ Việt Nam: lấy kết quả, quyết toán và lập kế hoạch ngày sau.
    - cron: "15 12 * * *"
    - cron: "35 12 * * *"
    - cron: "55 12 * * *"
  push:
    branches: ["main"]
    paths:
      - "scripts/sync_from_google_sheet.py"
      - "scripts/plan_next_day.py"
      - "scripts/plan_next_day.py.zlib.b64"
      - "data/automation-policy.json"
      - ".github/workflows/sync-google-sheet.yml"

permissions:
  contents: write

concurrency:
  group: mb-daily-result-and-plan
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Materialize permanent planning engine
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import zlib
          from pathlib import Path

          packed = Path("scripts/plan_next_day.py.zlib.b64")
          target = Path("scripts/plan_next_day.py")
          source = zlib.decompress(base64.b64decode(packed.read_text(encoding="utf-8")))
          if target.exists() and target.read_bytes() == source:
              print("Planning engine already materialized.")
          else:
              target.write_bytes(source)
              target.chmod(0o755)
              print("Materialized", target, hashlib.sha256(source).hexdigest())
          PY

      - name: Validate planning engine
        run: python scripts/plan_next_day.py --self-test

      - name: Download Google Sheet snapshot
        id: download
        continue-on-error: true
        env:
          GOOGLE_SHEET_ID: 1iVAfqmS-TvP02U8FtKSM2nr_7Dsd7qi2qEGnWV6IK7w
        run: |
          python - <<'PY'
          import csv
          import io
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          from openpyxl import Workbook, load_workbook

          sheet_id = os.environ["GOOGLE_SHEET_ID"]
          output = Path("/tmp/xsmb-source.xlsx")
          headers = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36",
              "Accept-Language": "vi-VN,vi;q=0.9,en;q=0.7",
          }
          attempts = []

          def fetch(url, timeout=90):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=timeout) as response:
                  body = response.read()
                  content_type = response.headers.get("content-type", "")
                  final_url = response.geturl()
              attempts.append({
                  "url": url.split("?")[0],
                  "status": "HTTP_OK",
                  "bytes": len(body),
                  "content_type": content_type,
                  "final_host": urllib.parse.urlparse(final_url).netloc,
              })
              return body

          xlsx_urls = [
              f"https://docs.google.com/spreadsheets/d/{sheet_id}/export?format=xlsx",
              f"https://docs.google.com/spreadsheets/d/{sheet_id}/export?exportFormat=xlsx&format=xlsx",
              f"https://docs.google.com/spreadsheets/u/0/d/{sheet_id}/export?format=xlsx",
              f"https://drive.google.com/uc?export=download&id={sheet_id}",
          ]
          selected = None
          for url in xlsx_urls:
              try:
                  body = fetch(url)
                  if not body.startswith(b"PK") or len(body) < 50_000:
                      raise RuntimeError(f"not a valid XLSX: {len(body)} bytes")
                  output.write_bytes(body)
                  wb = load_workbook(output, read_only=True, data_only=True)
                  names = set(wb.sheetnames)
                  wb.close()
                  if not ({"MB_History_27", "Raw_Results_IMPORT", "Raw_Results_2024_2026"} & names):
                      raise RuntimeError("XLSX lacks a usable result/history tab")
                  selected = "XLSX_EXPORT"
                  break
              except Exception as exc:
                  attempts.append({"url": url.split("?")[0], "status": "FAILED", "error": repr(exc)[:240]})

          def read_csv_sheet(sheet_name, gid):
              urls = [
                  f"https://docs.google.com/spreadsheets/d/{sheet_id}/gviz/tq?" + urllib.parse.urlencode({"tqx": "out:csv", "sheet": sheet_name}),
                  f"https://docs.google.com/spreadsheets/d/{sheet_id}/gviz/tq?" + urllib.parse.urlencode({"tqx": "out:csv", "gid": gid}),
                  f"https://docs.google.com/spreadsheets/d/{sheet_id}/export?" + urllib.parse.urlencode({"format": "csv", "gid": gid}),
              ]
              last_error = None
              for url in urls:
                  try:
                      body = fetch(url)
                      text = body.decode("utf-8-sig")
                      rows = list(csv.reader(io.StringIO(text)))
                      if not rows or len(rows[0]) < 2:
                          raise RuntimeError("CSV has no table")
                      if "google" in text[:500].lower() and "sign in" in text[:1000].lower():
                          raise RuntimeError("CSV endpoint returned sign-in HTML")
                      return rows, url
                  except Exception as exc:
                      last_error = exc
                      attempts.append({"url": url.split("?")[0], "status": "FAILED", "error": repr(exc)[:240]})
              raise RuntimeError(f"No public CSV endpoint for {sheet_name}: {last_error!r}")

          if selected is None:
              history_rows, history_url = read_csv_sheet("MB_History_27", "2026070407")
              valid_history = [row for row in history_rows[1:] if len(row) >= 28 and str(row[0]).strip()]
              if len(valid_history) < 100:
                  raise RuntimeError(f"History CSV too short: {len(valid_history)} rows")
              try:
                  x2_rows, x2_url = read_csv_sheet("X2_Live_Log_v1", "2026071012")
              except Exception:
                  x2_rows, x2_url = [["Date", "Brake_Remaining", "Loss_Streak", "Drawdown_VND", "Pilot_Status"]], "OPTIONAL_UNAVAILABLE"

              wb = Workbook()
              ws = wb.active
              ws.title = "MB_History_27"
              for row in history_rows:
                  ws.append(row[:28])
              raw = wb.create_sheet("Raw_Results_IMPORT")
              for row in history_rows:
                  raw.append(row[:28])
              x2 = wb.create_sheet("X2_Live_Log_v1")
              for row in x2_rows:
                  x2.append(row)
              wb.save(output)
              selected = "PUBLIC_CSV_GVIZ"

          access = {
              "schema_version": "MB_SOURCE_ACCESS_V1",
              "status": "OK",
              "selected": selected,
              "source_spreadsheet_id": sheet_id,
              "snapshot_path": "/tmp/xsmb-source.xlsx"
          }
          Path("data/source-access.json").write_text(
              json.dumps(access, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8"
          )
          print(json.dumps(access, ensure_ascii=False))
          print(f"Snapshot size: {output.stat().st_size} bytes")
          PY

      - name: Settle result and build next-day plan
        env:
          GOOGLE_SHEET_ID: 1iVAfqmS-TvP02U8FtKSM2nr_7Dsd7qi2qEGnWV6IK7w
          SOURCE_XLSX_PATH: /tmp/xsmb-source.xlsx
        run: |
          set +e
          if [ "${{ steps.download.outcome }}" != "success" ]; then
            python scripts/plan_next_day.py --data-fail "Không tải được Google Sheet XLSX/CSV; A0 bắt buộc."
            exit 0
          fi

          python scripts/sync_from_google_sheet.py >/tmp/mb-sync.log 2>&1
          sync_status=$?
          cat /tmp/mb-sync.log
          if [ $sync_status -ne 0 ]; then
            reason=$(tail -n 8 /tmp/mb-sync.log | tr '\n' ' ' | cut -c1-480)
            python scripts/plan_next_day.py --data-fail "Đồng bộ kết quả thất bại: ${reason}"
            exit 0
          fi

          python scripts/plan_next_day.py >/tmp/mb-plan.log 2>&1
          plan_status=$?
          cat /tmp/mb-plan.log
          if [ $plan_status -ne 0 ]; then
            reason=$(tail -n 8 /tmp/mb-plan.log | tr '\n' ' ' | cut -c1-480)
            python scripts/plan_next_day.py --data-fail "Rà soát ngày sau thất bại: ${reason}"
          fi
          exit 0

      - name: Validate website payload invariants
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          doc = json.loads(Path("data/current.json").read_text(encoding="utf-8"))
          policy = doc.get("milestone_policy") or {}
          assert policy.get("status") == "ACTIVE_MANDATORY_ABSOLUTE", policy
          groups = {str(g.get("id", "")).upper(): g for g in doc.get("groups", [])}
          for group_id in ("A1", "X2", "X3"):
              group = groups[group_id]
              candidates = group.get("candidates") or []
              assert candidates, f"{group_id} missing candidates"
              for candidate in candidates:
                  for field in ("earliest_eligible_date", "earliest_condition", "milestone_type"):
                      assert candidate.get(field), f"{group_id}/{candidate.get('code')} missing {field}"
          assert groups["X3"].get("earliest_basket_date"), "X3 missing earliest_basket_date"
          x2 = groups["X2"]
          forbidden = {
              "historical_profile", "quality_benchmark", "orders", "wins", "losses",
              "win_rate", "oos_win_rate", "pnl_vnd", "pnl_units",
              "max_drawdown_vnd", "max_drawdown_units"
          }
          assert not forbidden.intersection(x2), "X2 performance metrics leaked"
          pending = doc.get("pending_order") or {}
          assert not pending.get("pnl_included"), "Pending plan must not include P/L"
          print("PAYLOAD_INVARIANTS_OK")
          PY

      - name: Commit only when files changed
        run: |
          if git diff --quiet -- data scripts/plan_next_day.py; then
            echo "Không có dữ liệu hoặc kế hoạch mới."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data scripts/plan_next_day.py
          git commit -m "data: auto settle and plan $(TZ=Asia/Bangkok date +%F)"
          git pull --rebase origin main
          git push origin HEAD:main
