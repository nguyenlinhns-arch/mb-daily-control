name: Enforce X2 website display policy

# V32_PRODUCTION_GUARD: legacy writer is manual rollback only.
on:
  workflow_dispatch:
    inputs:
      confirm_legacy:
        description: "Nhập ENABLE_LEGACY để chạy bộ điều khiển cũ"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: enforce-x2-display-policy
  cancel-in-progress: false

jobs:
  enforce:
    if: ${{ inputs.confirm_legacy == 'ENABLE_LEGACY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove all X2 performance metrics from website payload
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/current.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          changed = False

          hidden_fields = [
              "historical_profile",
              "quality_benchmark",
              "orders",
              "wins",
              "losses",
              "win_rate",
              "oos_win_rate",
              "pnl_vnd",
              "pnl_units",
              "max_drawdown_vnd",
              "max_drawdown_units",
          ]

          for group in data.get("groups", []):
              if str(group.get("id", "")).upper() != "X2":
                  continue

              # X2 is a Shadow Validation block. Its website card must never
              # expose backtest counts, win rate, profit/loss or drawdown.
              for key in hidden_fields:
                  if key in group:
                      group.pop(key)
                      changed = True

              policy = {
                  "hide_fields": hidden_fields,
                  "keep_fields": [],
                  "scope": "WEBSITE_X2_NO_PERFORMANCE_METRICS_PERMANENT",
              }
              if group.get("display_policy") != policy:
                  group["display_policy"] = policy
                  changed = True

          if changed:
              path.write_text(
                  json.dumps(data, ensure_ascii=False, separators=(",", ":")) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Enforce X2 frontend render guard
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '${profile(g.historical_profile)}${quality(g.quality_benchmark)}'
          guarded = '${String(g.id||"").toUpperCase()==="X2"?"":profile(g.historical_profile)}${String(g.id||"").toUpperCase()==="X2"?"":quality(g.quality_benchmark)}'

          if guarded in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit("Could not find the profile render hook in index.html")

          path.write_text(text.replace(old, guarded, 1), encoding="utf-8")
          PY

      - name: Commit policy enforcement
        run: |
          if git diff --quiet -- data/current.json index.html; then
            echo "X2 website payload and frontend already contain no performance metrics."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/current.json index.html
          git commit -m "ui: permanently hide all X2 performance metrics"
          git pull --rebase origin main
          git push origin HEAD:main
