name: Sync XSMB from Google Sheet

on:
  workflow_dispatch:
  schedule:
    # 19:20 và 19:50 giờ Việt Nam (UTC+7)
    - cron: "20 12 * * *"
    - cron: "50 12 * * *"

permissions:
  contents: write

concurrency:
  group: sync-xsmb-sheet
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Sync latest locked draw
        env:
          GOOGLE_SHEET_ID: 1iVAfqmS-TvP02U8FtKSM2nr_7Dsd7qi2qEGnWV6IK7w
        run: python scripts/sync_from_google_sheet.py

      - name: Commit only when data changed
        run: |
          if git diff --quiet -- data/current.json; then
            echo "Không có dữ liệu mới."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/current.json
          git commit -m "data: auto sync XSMB $(date -u +%F)"
          git push
