name: Enforce A1 reverse50 and top status panels

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["MB Daily result settlement and next-day plan"]
    types: [completed]
  schedule:
    # Chạy sau pipeline canonical 14:00 / 19:15 / 19:35 / 19:55.
    - cron: "5 7 * * *"
    - cron: "20 12 * * *"
    - cron: "40 12 * * *"
    - cron: "0 13 * * *"
  push:
    branches: ["main"]
    paths:
      - "data/current.json"
      - "data/plans/**"
      - "data/automation-policy.json"
      - "index.html"
      - "scripts/enforce_a1_reverse.py"
      - "scripts/enforce_top3_first_block.py"
      - "scripts/enforce_top3_first_block.py.zlib.b64"
      - ".github/workflows/enforce-a1-reverse.yml"

permissions:
  contents: write

concurrency:
  group: enforce-a1-reverse50-and-top-panels-v3
  cancel-in-progress: false

jobs:
  enforce:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply A1 reverse50 and no-duplicate policy
        run: python scripts/enforce_a1_reverse.py

      - name: Build pinned A1 and X2/X3 status panels
        run: python scripts/enforce_top3_first_block.py

      - name: Validate permanent invariants
        run: |
          python scripts/enforce_a1_reverse.py --check
          python scripts/enforce_top3_first_block.py --check

      - name: Commit only when enforcement changed files
        run: |
          if git diff --quiet -- data; then
            echo "A1 reverse50 and top-panel rules already enforced."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git commit -m "data: enforce A1 reverse50 and top status panels"
          git pull --rebase origin main
          git push origin HEAD:main
