name: Apply multi-stake settlement patch

# V32_PRODUCTION_GUARD: legacy writer is manual rollback only.
on:
  workflow_dispatch:
    inputs:
      confirm_legacy:
        description: "Nhập ENABLE_LEGACY để chạy bộ điều khiển cũ"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: apply-multi-stake-settlement-patch
  cancel-in-progress: false

jobs:
  patch:
    if: ${{ inputs.confirm_legacy == 'ENABLE_LEGACY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Patch settlement engine
        run: python scripts/patch_multi_stake_settlement.py

      - name: Syntax check
        run: python -m py_compile scripts/sync_from_google_sheet.py

      - name: Commit patched engine
        run: |
          if git diff --quiet -- scripts/sync_from_google_sheet.py; then
            echo "Settlement engine already supports per-code stakes."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/sync_from_google_sheet.py
          git commit -m "ci: enable multi-method per-code settlement"
          git pull --rebase origin main
          git push origin HEAD:main
