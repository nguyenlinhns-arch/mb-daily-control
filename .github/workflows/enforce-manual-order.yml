name: Apply confirmed manual real orders

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "MB Daily result settlement and next-day plan"
      - "Enforce A1 reverse50 and top status panels"
      - "Enforce current A1/X2/X3 status panels"
    types: [completed]
  push:
    branches: ["main"]
    paths:
      - "data/current.json"
      - "data/manual-orders/**"
      - "scripts/apply_manual_orders_v2.py"
      - ".github/workflows/enforce-manual-order.yml"

permissions:
  contents: write

concurrency:
  group: apply-confirmed-manual-orders-v2
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply all confirmed orders
        run: python scripts/apply_manual_orders_v2.py

      - name: Validate confirmed-order invariant
        run: python scripts/apply_manual_orders_v2.py --check

      - name: Commit only when files changed
        run: |
          if git diff --quiet -- data; then
            echo "Confirmed manual orders already applied."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git commit -m "data: apply confirmed manual real orders"
          git pull --rebase origin main
          git push origin HEAD:main
