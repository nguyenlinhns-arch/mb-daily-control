name: V32 credential and access preflight

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/v32-readonly-preflight.yml"

permissions:
  contents: read

jobs:
  readonly-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONHASHSEED: "0"
      TZ: Asia/Bangkok

    steps:
      - name: Checkout exact main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-v32.txt

      - name: Install frozen runtime
        run: python -m pip install --requirement requirements-v32.txt

      - name: Verify private engine read access
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON" || { echo "Missing GOOGLE_SERVICE_ACCOUNT_JSON"; exit 2; }
          test ! -e engine_v32 || { echo "Public checkout unexpectedly contains engine_v32"; exit 2; }
          python scripts/fetch_v32_engine.py \
            --metadata data/v32-engine-runtime.json \
            --destination engine_v32
          python scripts/v32_daily.py verify-seed

      - name: Verify read access to source, P/L and five ledgers
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/v32-preflight"
          python scripts/google_sheets_bridge.py snapshot \
            --settlement-date 2026-07-16 \
            --output-xlsx "$RUNNER_TEMP/v32-preflight/source.xlsx" \
            --output-pnl-json "$RUNNER_TEMP/v32-preflight/pnl-snapshot.json"

      - name: Confirm no write-capable token or private output persisted
        run: |
          set -euo pipefail
          ! git ls-files engine_v32 | grep .
          git diff --exit-code
          echo "V32_READONLY_PREFLIGHT_OK"
