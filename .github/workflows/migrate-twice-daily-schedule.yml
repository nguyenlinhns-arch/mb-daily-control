name: One-time migrate all automation schedules to 08:00 and 19:30 VN

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/migrate-twice-daily-schedule.yml"

permissions:
  contents: write

concurrency:
  group: mb-one-time-schedule-migration
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Replace every old cron schedule
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          root = Path('.')
          workflows = root / '.github' / 'workflows'
          main_path = workflows / 'sync-google-sheet.yml'
          self_path = workflows / 'migrate-twice-daily-schedule.yml'

          def strip_schedule(text: str) -> str:
              lines = text.splitlines()
              out: list[str] = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if line.startswith('  schedule:'):
                      i += 1
                      while i < len(lines):
                          probe = lines[i]
                          indent = len(probe) - len(probe.lstrip(' '))
                          if probe.strip() and indent <= 2:
                              break
                          i += 1
                      continue
                  out.append(line)
                  i += 1
              return '\n'.join(out).rstrip() + '\n'

          def install_main_schedule(text: str) -> str:
              text = strip_schedule(text)
              lines = text.splitlines()
              insert_at = None
              for index, line in enumerate(lines):
                  if line.startswith('  workflow_dispatch:'):
                      insert_at = index + 1
                      break
              if insert_at is None:
                  raise RuntimeError('sync-google-sheet.yml lacks workflow_dispatch')
              block = [
                  '  schedule:',
                  '    # 08:00 giờ Việt Nam (01:00 UTC): rà soát đầy đủ, quyết toán nếu có dữ liệu mới, ghi file và lập kế hoạch kế tiếp.',
                  '    - cron: "0 1 * * *"',
                  '    # 19:30 giờ Việt Nam (12:30 UTC): khóa kết quả ngày, ghi nhận P/L, ghi file và công bố kế hoạch ngày sau.',
                  '    - cron: "30 12 * * *"',
              ]
              lines[insert_at:insert_at] = block
              return '\n'.join(lines).rstrip() + '\n'

          changed: list[str] = []
          for path in sorted(workflows.glob('*.y*ml')):
              if path == self_path:
                  continue
              old = path.read_text(encoding='utf-8')
              new = install_main_schedule(old) if path == main_path else strip_schedule(old)
              if path == main_path:
                  if 'scripts/export_sheet_sync.py' not in new:
                      marker = '      - "scripts/patch_a1_top3_watchlist.py"\n'
                      if marker not in new:
                          raise RuntimeError('Cannot insert export_sheet_sync.py push path')
                      new = new.replace(marker, marker + '      - "scripts/export_sheet_sync.py"\n', 1)
                  if 'Export file/website sync CSVs' not in new:
                      marker = '      - name: Validate absolute milestone and website invariants\n'
                      if marker not in new:
                          raise RuntimeError('Cannot insert CSV export step')
                      step = (
                          '      - name: Export file/website sync CSVs\n'
                          '        run: |\n'
                          '          python scripts/export_sheet_sync.py\n'
                          '          python scripts/export_sheet_sync.py --check\n\n'
                      )
                      new = new.replace(marker, step + marker, 1)
              if new != old:
                  path.write_text(new, encoding='utf-8')
                  changed.append(str(path))

          for path in sorted(workflows.glob('*.y*ml')):
              if path == self_path:
                  continue
              text = path.read_text(encoding='utf-8')
              has_schedule = '\n  schedule:\n' in '\n' + text
              if path == main_path:
                  assert has_schedule, path
                  assert 'cron: "0 1 * * *"' in text, path
                  assert 'cron: "30 12 * * *"' in text, path
                  assert text.count('    - cron:') == 2, path
              else:
                  assert not has_schedule, f'Old schedule remains in {path}'

          policy_path = root / 'data' / 'automation-policy.json'
          policy = json.loads(policy_path.read_text(encoding='utf-8'))
          pipeline = policy.setdefault('pipeline', {})
          pipeline['schedule_policy_version'] = 'MB_TWICE_DAILY_0800_1930_V1_20260712'
          pipeline['schedule_timezone'] = 'Asia/Ho_Chi_Minh'
          pipeline['full_run_schedule_vn'] = ['08:00', '19:30']
          pipeline['cron_utc'] = ['0 1 * * *', '30 12 * * *']
          pipeline['review_schedule_vn'] = ['08:00', '19:30']
          pipeline['result_schedule_vn'] = ['08:00', '19:30']
          pipeline['old_schedules_removed'] = True
          pipeline['run_scope_at_both_times'] = [
              'review latest locked result',
              'settle confirmed real orders idempotently',
              'record P/L and settlement ledger',
              'write repository data files and Google Sheet import CSVs',
              'recompute A1/X2/X3 and ROLL7',
              'publish website for the next draw',
          ]
          policy_path.write_text(json.dumps(policy, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          changed.append(str(policy_path))

          vn = timezone(timedelta(hours=7))
          schedule_doc = {
              'schema_version': 'MB_SCHEDULE_POLICY_V1',
              'status': 'ACTIVE_CANONICAL',
              'policy_id': 'MB_TWICE_DAILY_0800_1930_V1_20260712',
              'timezone': 'Asia/Ho_Chi_Minh',
              'times_vn': ['08:00', '19:30'],
              'cron_utc': ['0 1 * * *', '30 12 * * *'],
              'old_cron_schedules_removed': True,
              'workflow': '.github/workflows/sync-google-sheet.yml',
              'actions_each_run': pipeline['run_scope_at_both_times'],
              'updated_at': datetime.now(vn).isoformat(timespec='seconds'),
          }
          schedule_path = root / 'data' / 'schedule-policy.json'
          schedule_path.write_text(json.dumps(schedule_doc, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          changed.append(str(schedule_path))

          import subprocess
          subprocess.run(['python', 'scripts/export_sheet_sync.py'], check=True)
          subprocess.run(['python', 'scripts/export_sheet_sync.py', '--check'], check=True)

          self_path.unlink()
          print('MIGRATION_CHANGED=' + ','.join(changed))
          PY

      - name: Commit canonical twice-daily schedule
        run: |
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A .github/workflows data scripts/export_sheet_sync.py
          if git diff --cached --quiet; then
            echo "Schedule already migrated."
            exit 0
          fi
          git commit -m "automation: replace all schedules with 08:00 and 19:30 VN"
          git pull --rebase origin main
          git push origin HEAD:main
