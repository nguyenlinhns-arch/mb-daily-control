name: MB Daily result settlement and next-day plan

on:
  workflow_dispatch:
  schedule:
    # 14:00 giờ Việt Nam: rà lại kế hoạch từ kỳ đã khóa.
    - cron: "0 7 * * *"
    # 19:15, 19:35, 19:55 giờ Việt Nam: khóa kết quả, quyết toán, lập kế hoạch ngày sau.
    - cron: "15 12 * * *"
    - cron: "35 12 * * *"
    - cron: "55 12 * * *"
  push:
    branches: ["main"]
    paths:
      - "scripts/sync_from_google_sheet.py"
      - "scripts/plan_next_day.py.zlib.b64"
      - "scripts/build_public_snapshot.py.zlib.b64"
      - "data/automation-policy.json"
      - "data/history-bootstrap/**"
      - ".github/workflows/sync-google-sheet.yml"

permissions:
  contents: write

concurrency:
  group: mb-daily-result-and-plan
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Materialize permanent engines
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import zlib
          from pathlib import Path

          items = [
              (Path("scripts/plan_next_day.py.zlib.b64"), Path("scripts/plan_next_day.py")),
              (Path("scripts/build_public_snapshot.py.zlib.b64"), Path("scripts/build_public_snapshot.py")),
          ]
          for packed, target in items:
              source = zlib.decompress(base64.b64decode(packed.read_text(encoding="utf-8")))
              if not target.exists() or target.read_bytes() != source:
                  target.write_bytes(source)
              target.chmod(0o755)
              print(target, hashlib.sha256(source).hexdigest())
          PY

      - name: Validate engines and history bootstrap
        run: |
          python scripts/plan_next_day.py --self-test
          python scripts/build_public_snapshot.py --self-test

      - name: Build locked source snapshot
        id: source
        continue-on-error: true
        env:
          GOOGLE_SHEET_ID: 1iVAfqmS-TvP02U8FtKSM2nr_7Dsd7qi2qEGnWV6IK7w
        run: |
          set -e
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path
          from openpyxl import load_workbook

          sheet_id = os.environ["GOOGLE_SHEET_ID"]
          output = Path("/tmp/xsmb-source.xlsx")
          urls = [
              f"https://docs.google.com/spreadsheets/d/{sheet_id}/export?format=xlsx",
              f"https://docs.google.com/spreadsheets/u/0/d/{sheet_id}/export?format=xlsx",
          ]
          selected = None
          errors = []
          for url in urls:
              try:
                  request = urllib.request.Request(url, headers={"User-Agent": "MB-Daily-Control/4.0"})
                  with urllib.request.urlopen(request, timeout=75) as response:
                      body = response.read()
                  if not body.startswith(b"PK") or len(body) < 50_000:
                      raise RuntimeError(f"invalid XLSX size={len(body)}")
                  output.write_bytes(body)
                  wb = load_workbook(output, read_only=True, data_only=True)
                  names = set(wb.sheetnames)
                  wb.close()
                  if not ({"MB_History_27", "Raw_Results_IMPORT", "Raw_Results_2024_2026"} & names):
                      raise RuntimeError("XLSX lacks canonical history/result tab")
                  selected = "GOOGLE_SHEET_XLSX"
                  break
              except Exception as exc:
                  errors.append(repr(exc)[:300])
          if selected:
              Path("data/source-access.json").write_text(
                  json.dumps({
                      "schema_version": "MB_SOURCE_ACCESS_V2",
                      "status": "OK",
                      "selected": selected,
                      "source_spreadsheet_id": sheet_id,
                      "milestone_requirement": "A1/X2/X3 candidates must include earliest date, condition, and type"
                  }, ensure_ascii=False, separators=(",", ":")) + "\n",
                  encoding="utf-8"
              )
              print(selected, output.stat().st_size)
          else:
              Path("/tmp/google-source-errors.txt").write_text("\n".join(errors), encoding="utf-8")
              raise SystemExit(7)
          PY

      - name: Use permanent public multi-source fallback
        if: steps.source.outcome != 'success'
        id: public_source
        continue-on-error: true
        run: |
          cat /tmp/google-source-errors.txt 2>/dev/null || true
          python scripts/build_public_snapshot.py --output /tmp/xsmb-source.xlsx

      - name: Settle result and build next-day plan
        env:
          GOOGLE_SHEET_ID: 1iVAfqmS-TvP02U8FtKSM2nr_7Dsd7qi2qEGnWV6IK7w
          SOURCE_XLSX_PATH: /tmp/xsmb-source.xlsx
        run: |
          set +e
          if [ "${{ steps.source.outcome }}" != "success" ] && [ "${{ steps.public_source.outcome }}" != "success" ]; then
            python scripts/plan_next_day.py --data-fail "Không khóa được nguồn Google hoặc tối thiểu hai nguồn công khai; A0 bắt buộc."
            exit 0
          fi

          python scripts/sync_from_google_sheet.py >/tmp/mb-sync.log 2>&1
          sync_status=$?
          cat /tmp/mb-sync.log
          if [ $sync_status -ne 0 ]; then
            reason=$(tail -n 8 /tmp/mb-sync.log | tr '\n' ' ' | cut -c1-480)
            python scripts/plan_next_day.py --data-fail "Đồng bộ kết quả thất bại: ${reason}"
            exit 0
          fi

          python scripts/plan_next_day.py >/tmp/mb-plan.log 2>&1
          plan_status=$?
          cat /tmp/mb-plan.log
          if [ $plan_status -ne 0 ]; then
            reason=$(tail -n 8 /tmp/mb-plan.log | tr '\n' ' ' | cut -c1-480)
            python scripts/plan_next_day.py --data-fail "Rà soát ngày sau thất bại: ${reason}"
          fi
          exit 0

      - name: Validate absolute milestone and website invariants
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          doc = json.loads(Path("data/current.json").read_text(encoding="utf-8"))
          policy = doc.get("milestone_policy") or {}
          assert policy.get("status") == "ACTIVE_MANDATORY_ABSOLUTE", policy
          assert policy.get("recalculate_after_each_locked_draw") is True
          groups = {str(g.get("id", "")).upper(): g for g in doc.get("groups", [])}
          for group_id in ("A1", "X2", "X3"):
              group = groups[group_id]
              candidates = group.get("candidates") or []
              assert candidates, f"{group_id} missing candidates"
              for candidate in candidates:
                  for field in ("earliest_eligible_date", "earliest_condition", "milestone_type"):
                      assert candidate.get(field), f"{group_id}/{candidate.get('code')} missing {field}"
          assert groups["X3"].get("earliest_basket_date"), "X3 missing earliest_basket_date"
          x2 = groups["X2"]
          forbidden = {
              "historical_profile", "quality_benchmark", "orders", "wins", "losses",
              "win_rate", "oos_win_rate", "pnl_vnd", "pnl_units",
              "max_drawdown_vnd", "max_drawdown_units"
          }
          assert not forbidden.intersection(x2), "X2 performance metrics leaked"
          pending = doc.get("pending_order") or {}
          assert not pending.get("pnl_included"), "Pending plan must not include P/L"
          assert (doc.get("automation") or {}).get("milestones_complete") is True
          print("ABSOLUTE_MILESTONE_AND_PAYLOAD_INVARIANTS_OK")
          PY

      - name: Commit only when files changed
        run: |
          if git diff --quiet -- data scripts/plan_next_day.py scripts/build_public_snapshot.py; then
            echo "Không có dữ liệu hoặc kế hoạch mới."
            exit 0
          fi
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data scripts/plan_next_day.py scripts/build_public_snapshot.py
          git commit -m "data: auto settle, milestone and plan $(TZ=Asia/Bangkok date +%F)"
          git pull --rebase origin main
          git push origin HEAD:main
