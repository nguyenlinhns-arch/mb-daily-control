name: Probe public XSMB sources

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/sync-google-sheet.yml"

permissions:
  contents: write

concurrency:
  group: probe-xsmb-sources
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Probe candidate public result pages
        run: |
          python3 - <<'PY'
          import json
          import re
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          urls = [
              "https://xosodaiphat.com/xsmb-11-07-2026.html",
              "https://xoso.com.vn/xsmb-11-07-2026.html",
              "https://xoso.me/xsmb-11-07-2026.html",
              "https://ketqua.net/xo-so-truyen-thong.php?ngay=11-07-2026",
              "https://www.minhngoc.net.vn/ket-qua-xo-so/mien-bac/11-07-2026.html",
              "https://xosothienphu.vn/xsmb-11-07-2026.html",
              "https://xoso365.vn/xsmb-11-07-2026.html",
              "https://kqxs.vn/mien-bac/xsmb-11-07-2026",
          ]
          tokens = ["09401", "36061", "77252", "60057", "51690", "28065"]
          rows = []
          for url in urls:
              row = {"url": url}
              try:
                  req = urllib.request.Request(url, headers={
                      "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36",
                      "Accept-Language": "vi-VN,vi;q=0.9,en;q=0.7",
                  })
                  with urllib.request.urlopen(req, timeout=25) as response:
                      body = response.read(2_000_000)
                      text = body.decode("utf-8", "replace")
                      plain = re.sub(r"<[^>]+>", " ", text)
                      plain = re.sub(r"\\s+", " ", plain)
                      pos = plain.find("09401")
                      row.update({
                          "status": response.status,
                          "final_url": response.geturl(),
                          "content_type": response.headers.get("content-type"),
                          "bytes": len(body),
                          "token_hits": [token for token in tokens if token in text or token in plain],
                          "snippet": plain[max(0, pos-120):pos+420] if pos >= 0 else plain[:300],
                      })
              except urllib.error.HTTPError as exc:
                  row.update({"status": exc.code, "error": str(exc)})
              except Exception as exc:
                  row.update({"status": 0, "error": repr(exc)})
              rows.append(row)
          out = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "expected_tokens": tokens,
              "sources": rows,
          }
          Path("data/source-probe.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Commit probe report
        run: |
          git config user.name "mb-daily-control-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/source-probe.json
          git commit -m "test: probe public XSMB sources"
          git pull --rebase origin main
          git push origin HEAD:main
