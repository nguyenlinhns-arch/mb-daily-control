name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zero-dependency static site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/fast
          cp index.html _site/index.html
          cp index.html _site/fast/index.html
          printf '%s\n' "static-dashboard-${GITHUB_SHA}" > _site/version.txt
          touch _site/.nojekyll
          test -s _site/index.html
          grep -q 'data-static-dashboard="1"' _site/index.html
          if grep -q 'Đang tải kế hoạch kỳ sắp tới' _site/index.html; then
            echo 'Dynamic loading placeholder must not be deployed.' >&2
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
